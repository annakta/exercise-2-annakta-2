<!DOCTYPE html>
<html>

<head>

<title>Edit Movie</title>

<link rel="stylesheet" href="edit.css">

<script src="edit.js"></script>

</head>

<body>

<form>

<input type="hidden" id="imdbID">

<div>

<label for="Title">Title</label>

<input id="Title" required>

</div>

<div>

<label for="Released">Released</label>

<input type="date" id="Released" required>

</div>

<div>

<label for="Runtime">Runtime</label>

<input type="number" id="Runtime" required>

</div>

<div>

<label for="Genres">Genres</label>

<select id="Genres" multiple required>

<option>Action</option>
<option>Adventure</option>
<option>Animation</option>
<option>Biography</option>
<option>Comedy</option>
<option>Crime</option>
<option>Documentary</option>
<option>Drama</option>
<option>Family</option>
<option>Fantasy</option>
<option>Film Noir</option>
<option>History</option>
<option>Horror</option>
<option>Music</option>
<option>Musical</option>
<option>Mystery</option>
<option>Romance</option>
<option>Sci-Fi</option>
<option>Short Film</option>
<option>Sport</option>
<option>Superhero</option>
<option>Thriller</option>
<option>War</option>
<option>Western</option>

</select>

</div>

<div>

<label for="Directors">Directors</label>

<input id="Directors" required>

</div>

<div>

<label for="Writers">Writers</label>

<input id="Writers" required>

</div>

<div>

<label for="Actors">Actors</label>

<input id="Actors" required>

</div>

<div>

<label for="Plot">Plot</label>

<textarea id="Plot" rows="5" required></textarea>

</div>

<div>

<label for="Poster">Poster URL</label>

<input id="Poster" required>

</div>

<div>

<label for="Metascore">Metascore</label>

<input type="number" id="Metascore" required>

</div>

<div>

<label for="imdbRating">IMDB Rating</label>

<input type="number" step="0.1" id="imdbRating" required>

</div>

<button type="button" onclick="putMovie()">

Save

</button>

<button type="button" onclick="location.href='index.html'">

Cancel

</button>

</form>

</body>

</html>
